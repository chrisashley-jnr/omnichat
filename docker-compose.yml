version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile.server
    environment:
      - PORT=4000
      - CLIENT_ORIGIN=https://localhost  # Matches Nginx setup
      - REDIS_URL=redis://redis:6379
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - BAN_THRESHOLD=${BAN_THRESHOLD:-5}
      - TURN_URLS=${TURN_URLS:-}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
      - GEOBLOCK_COUNTRIES=${GEOBLOCK_COUNTRIES:-}
      - AD_PROVIDER=${AD_PROVIDER:-adsense}
      - AD_UNIT_PRECHAT=${AD_UNIT_PRECHAT:-REPLACE_WITH_AD_UNIT_ID}
      - AD_UNIT_SIDEBAR=${AD_UNIT_SIDEBAR:-REPLACE_WITH_AD_UNIT_ID}
      - AD_UNIT_INTERSTITIAL=${AD_UNIT_INTERSTITIAL:-REPLACE_WITH_AD_UNIT_ID}
    depends_on:
      - redis
    restart: always

  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    environment:
      - NEXT_PUBLIC_SIGNALING_URL=https://localhost
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    depends_on:
      - server
    restart: always

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - client
      - server
    restart: always

volumes:
  redis_data:
